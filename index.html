<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nexo.la | Intelligence Hub</title>
    <!-- Bibliotecas externas con versiones estables -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F1F2E9; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nexo-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nexo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Encapsulamiento para evitar errores de colisión de variables (como Infinity)
        {
            const { useState, useEffect, useMemo } = React;

            // Componente de Logo Robusto con manejo de estado para fallos de imagen
            const NexoLogo = ({ className = "h-8" }) => {
                const [imgError, setImgError] = useState(false);

                if (imgError) {
                    return (
                        <span className="font-black text-2xl text-[#122805] tracking-tighter">
                            nexo.la
                        </span>
                    );
                }

                return (
                    <img 
                        src="logo.bmp" 
                        className={className} 
                        alt="nexo.la"
                        style={{ objectFit: 'contain' }}
                        onError={() => setImgError(true)}
                    />
                );
            };

            // Componente de Icono Seguro para evitar el error #130 de React
            const NexoIcon = ({ name, size = 20, className = "" }) => {
                const iconElement = useMemo(() => {
                    // Lucide registra sus iconos en el objeto global 'lucide'
                    const iconData = window.lucide ? window.lucide.icons[name] : null;
                    if (!iconData) return null;
                    
                    // Creamos el SVG manualmente para máxima compatibilidad
                    const [tag, attrs, children] = iconData;
                    return (
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width={size}
                            height={size}
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            strokeWidth="2"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            className={className}
                        >
                            {children.map((child, i) => {
                                const [childTag, childAttrs] = child;
                                return React.createElement(childTag, { key: i, ...childAttrs });
                            })}
                        </svg>
                    );
                }, [name, size, className]);

                return iconElement || <div style={{ width: size, height: size }} className="bg-gray-200 rounded-full inline-block" />;
            };

            const App = () => {
                const [activeTab, setActiveTab] = useState('ecosystem');
                const subscribeUrl = "https://opt.nexo.la/registro.html"; 
                const latestNewsletterUrl = "https://mail.nexo.la/email/view/69ec97e0b207f744157035";

                const handleSubscribe = () => window.open(subscribeUrl, '_blank');
                const handleViewNewsletter = () => window.open(latestNewsletterUrl, '_blank');

                return (
                    <div className="min-h-screen flex flex-col fade-in">
                        {/* Navegación Premium */}
                        <nav className="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 px-6 py-4">
                            <div className="max-w-6xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <NexoLogo className="h-7 w-auto" />
                                    <span className="h-4 w-px bg-gray-200 hidden sm:block"></span>
                                    <span className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 hidden sm:block">Intelligence Hub</span>
                                </div>
                                <div className="flex gap-6 md:gap-8 text-[10px] font-bold uppercase tracking-widest">
                                    <button 
                                        onClick={() => setActiveTab('ecosystem')} 
                                        className={`pb-1 border-b-2 transition-colors ${activeTab === 'ecosystem' ? 'border-[#34CC03] text-[#122805]' : 'border-transparent text-gray-400'}`}
                                    >
                                        Ecosistema
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('content')} 
                                        className={`pb-1 border-b-2 transition-colors ${activeTab === 'content' ? 'border-[#34CC03] text-[#122805]' : 'border-transparent text-gray-400'}`}
                                    >
                                        Contenido
                                    </button>
                                </div>
                            </div>
                        </nav>

                        <main className="max-w-6xl mx-auto py-12 md:py-20 px-6 w-full">
                            {/* Hero Section */}
                            <section className="text-center mb-24">
                                <div className="inline-flex items-center gap-2 px-4 py-1 bg-white border border-gray-100 rounded-full mb-8 shadow-sm">
                                    <div className="w-2 h-2 bg-[#34CC03] rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-[#122805]">Portafolio Ejecutivo INCAE</span>
                                </div>
                                <h1 className="text-5xl md:text-7xl font-black text-[#122805] leading-[1.1] tracking-tighter mb-8">
                                    Estrategia de Datos <br />
                                    <span className="text-[#34CC03]">para Decisiones de Negocio</span>
                                </h1>
                                <p className="text-xl text-gray-500 max-w-2xl mx-auto font-light leading-relaxed mb-12">
                                    Unificando flujos de información para escalar la plataforma de contenidos más inteligente de la región: <span className="font-bold text-[#122805]">nexo.la</span>.
                                </p>
                                <button 
                                    onClick={handleSubscribe} 
                                    className="bg-[#122805] text-white px-10 py-4 rounded-full font-bold flex items-center justify-center gap-3 hover:bg-[#34CC03] hover:text-[#122805] transition-all shadow-xl shadow-[#34CC03]/10 mx-auto"
                                >
                                    Suscribirse al Boletín <NexoIcon name="mail" size={18} />
                                </button>
                            </section>

                            {/* El Desafío */}
                            <section className="grid md:grid-cols-2 gap-12 mb-32">
                                <div className="bg-white p-10 rounded-[2.5rem] shadow-sm border border-gray-50 nexo-card">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">El Desafío Operativo</h2>
                                    <h3 className="text-3xl font-bold text-[#122805] mb-6 tracking-tight">De silos a un cerebro centralizado.</h3>
                                    <p className="text-gray-500 font-light leading-relaxed mb-8">
                                        Actualmente gestionamos datos en múltiples fuentes. Mi propuesta para INCAE centraliza este ecosistema para optimizar la entregabilidad y el crecimiento basado en evidencia.
                                    </p>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-6 bg-[#F1F2E9] rounded-2xl border border-gray-100 text-center">
                                            <div className="flex justify-center mb-2 text-[#34CC03]">
                                                <NexoIcon name="shield-alert" size={24} />
                                            </div>
                                            <div className="text-2xl font-black text-[#122805]">0.1%</div>
                                            <div className="text-[10px] font-bold uppercase opacity-40">Spam AWS Limit</div>
                                        </div>
                                        <div className="p-6 bg-[#F1F2E9] rounded-2xl border border-gray-100 text-center">
                                            <div className="flex justify-center mb-2 text-[#34CC03]">
                                                <NexoIcon name="users" size={24} />
                                            </div>
                                            <div className="text-2xl font-black text-[#122805]">+6,000</div>
                                            <div className="text-[10px] font-bold uppercase opacity-40">Suscriptores</div>
                                        </div>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <div className="p-8 bg-[#122805] text-white rounded-3xl relative overflow-hidden shadow-lg h-full flex flex-col justify-center">
                                        <div className="absolute top-0 right-0 p-4 opacity-5">
                                            <NexoIcon name="database" size={120} />
                                        </div>
                                        <h4 className="text-xs font-bold uppercase tracking-widest text-[#34CC03] mb-4">Métrica Sagrada</h4>
                                        <p className="text-xl font-light leading-snug italic">
                                            "Nuestra capacidad de crecer depende de nuestra reputación. La IA es el guardián de nuestra comunidad."
                                        </p>
                                    </div>
                                </div>
                            </section>

                            {/* Contenido Section */}
                            <section id="content" className="mb-32">
                                <div className="flex justify-between items-end mb-12">
                                    <div>
                                        <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-4">Journal & Insights</h2>
                                        <h3 className="text-4xl font-bold text-[#122805] tracking-tighter italic">Nuestro contenido</h3>
                                    </div>
                                </div>

                                <div className="grid md:grid-cols-12 gap-8">
                                    <div className="md:col-span-8 bg-white rounded-[3rem] border border-gray-100 overflow-hidden shadow-sm nexo-card">
                                        <div className="grid md:grid-cols-2 h-full">
                                            <div className="bg-gray-100 relative min-h-[300px] flex items-center justify-center">
                                                <a href="https://youtube.com/shorts/jv9lZsHuRdA?si=h64-wyayzchtv6mc" target="_blank" className="relative z-10 group">
                                                    <div className="w-16 h-16 bg-[#34CC03] rounded-full flex items-center justify-center text-[#122805] shadow-2xl group-hover:scale-110 transition-transform">
                                                        <NexoIcon name="play" size={24} className="fill-current" />
                                                    </div>
                                                </a>
                                            </div>
                                            <div className="p-10 flex flex-col justify-center">
                                                <span className="text-[10px] font-bold uppercase tracking-widest text-[#34CC03] mb-4">Video Short</span>
                                                <h4 className="text-2xl font-bold text-[#122805] mb-4 leading-tight italic">Análisis en 60 segundos</h4>
                                                <p className="text-sm text-gray-500 font-light mb-8">Formatos de alto impacto para potenciar el alcance móvil.</p>
                                                <a href="https://youtube.com/shorts/jv9lZsHuRdA?si=h64-wyayzchtv6mc" target="_blank" className="flex items-center gap-3 text-xs font-black uppercase tracking-widest text-[#122805] hover:text-[#34CC03] transition-colors">
                                                    Ver en YouTube <NexoIcon name="arrow-up-right" size={16} />
                                                </a>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="md:col-span-4 bg-white rounded-[3rem] border border-gray-100 p-10 flex flex-col justify-between shadow-sm nexo-card">
                                        <div>
                                            <div className="w-10 h-10 bg-[#F1F2E9] rounded-xl flex items-center justify-center mb-6 text-[#34CC03]">
                                                <NexoIcon name="file-text" size={24} />
                                            </div>
                                            <h4 className="text-xl font-bold text-[#122805] mb-4">Último Boletín</h4>
                                            <p className="text-sm text-gray-500 font-light leading-relaxed">Ejemplo real de curaduría enviada a nuestra comunidad.</p>
                                        </div>
                                        <div className="space-y-2 mt-8">
                                            <button onClick={handleViewNewsletter} className="w-full py-3 bg-[#F1F2E9] text-[#122805] rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-gray-200 transition-all">Leer boletín</button>
                                            <button onClick={handleSubscribe} className="w-full py-3 bg-[#122805] text-white rounded-xl text-[10px] font-bold uppercase tracking-widest hover:bg-[#34CC03] hover:text-[#122805] transition-all">Suscribirse</button>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* Cierre */}
                            <section className="text-center py-20 bg-white rounded-[4rem] border border-gray-50 shadow-sm px-6 mb-20">
                                <div className="mb-10 flex justify-center">
                                    <NexoLogo className="h-10 w-auto opacity-20" />
                                </div>
                                <h2 className="text-4xl font-black text-[#122805] mb-6 tracking-tighter">De un Portafolio a un Activo</h2>
                                <p className="text-gray-400 font-light text-lg mb-12 italic max-w-2xl mx-auto leading-relaxed">
                                    "La infraestructura de datos sobre la cual nexo.la escalará su impacto regional."
                                </p>
                                <button onClick={handleSubscribe} className="px-12 py-4 bg-[#34CC03] text-[#122805] rounded-full font-bold uppercase text-[10px] tracking-widest hover:shadow-xl shadow-[#34CC03]/20 transition-all active:scale-95">
                                    Unirse a nexo.la
                                </button>
                            </section>
                        </main>

                        <footer className="py-12 bg-white border-t border-gray-100 text-center mt-auto">
                            <NexoLogo className="h-4 w-auto mx-auto mb-4 opacity-40" />
                            <p className="text-[10px] text-gray-400 uppercase tracking-widest">© 2024 Intelligence Hub | INCAE</p>
                        </footer>
                    </div>
                );
            };

            // Renderizado seguro
            const container = document.getElementById('root');
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<App />);
            }
        }
    </script>
</body>
</html>
