<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nexo.la | Intelligence Hub - Portafolio IA & BI</title>
    <!-- Bibliotecas externas con versiones estables -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #F1F2E9; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .nexo-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nexo-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        .executive-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Encapsulamiento para evitar errores de colisión de variables (como Infinity)
        {
            const { useState, useMemo } = React;

            // Componente de Logo Robusto
            const NexoLogo = ({ className = "h-8" }) => {
                const [imgError, setImgError] = useState(false);
                if (imgError) {
                    return <span className="font-black text-2xl text-[#122805] tracking-tighter">nexo.la</span>;
                }
                return (
                    <img 
                        src="logo.bmp" 
                        className={className} 
                        alt="nexo.la"
                        style={{ objectFit: 'contain' }}
                        onError={() => setImgError(true)}
                    />
                );
            };

            // Componente de Icono Seguro
            const NexoIcon = ({ name, size = 20, className = "" }) => {
                const iconElement = useMemo(() => {
                    const iconData = window.lucide ? window.lucide.icons[name] : null;
                    if (!iconData) return null;
                    const [tag, attrs, children] = iconData;
                    return (
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width={size}
                            height={size}
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            strokeWidth="2"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            className={className}
                        >
                            {children.map((child, i) => {
                                const [childTag, childAttrs] = child;
                                return React.createElement(childTag, { key: i, ...childAttrs });
                            })}
                        </svg>
                    );
                }, [name, size, className]);
                return iconElement || <div style={{ width: size, height: size }} className="bg-gray-200 rounded-full inline-block" />;
            };

            const App = () => {
                const subscribeUrl = "https://opt.nexo.la/registro.html"; 
                const latestNewsletterUrl = "https://mail.nexo.la/email/view/69ec97e0b207f744157035";

                return (
                    <div className="min-h-screen flex flex-col fade-in">
                        {/* Navegación Estilo McKinsey */}
                        <nav className="bg-white/95 backdrop-blur-sm sticky top-0 z-50 border-b border-gray-100 px-6 py-4">
                            <div className="max-w-6xl mx-auto flex justify-between items-center">
                                <div className="flex items-center gap-4">
                                    <NexoLogo className="h-7 w-auto" />
                                    <span className="h-4 w-px bg-gray-200 hidden sm:block"></span>
                                    <span className="text-[10px] font-black uppercase tracking-[0.3em] text-gray-400 hidden sm:block">Intelligence Hub</span>
                                </div>
                                <div className="hidden md:flex gap-8 text-[10px] font-bold uppercase tracking-widest text-[#122805]">
                                    <a href="#intro" className="hover:text-[#34CC03] transition-colors">Ecosistema</a>
                                    <a href="#justificacion" className="hover:text-[#34CC03] transition-colors">Estrategia</a>
                                    <a href="#audiencia" className="hover:text-[#34CC03] transition-colors">Audiencia</a>
                                    <a href="#diseno" className="hover:text-[#34CC03] transition-colors">Diseño</a>
                                </div>
                            </div>
                        </nav>

                        <main className="max-w-6xl mx-auto py-12 md:py-20 px-6 w-full space-y-32">
                            
                            {/* Hero Section */}
                            <section className="text-center">
                                <div className="inline-flex items-center gap-2 px-4 py-1 bg-white border border-gray-100 rounded-full mb-8 shadow-sm">
                                    <div className="w-2 h-2 bg-[#34CC03] rounded-full animate-pulse"></div>
                                    <span className="text-[10px] font-black uppercase tracking-widest text-[#122805]">Portafolio Ejecutivo | Programa IA INCAE</span>
                                </div>
                                <h1 className="text-5xl md:text-7xl font-black text-[#122805] leading-[1.1] tracking-tighter mb-8">
                                    Nexo Intelligence Hub: <br />
                                    <span className="text-[#34CC03]">Datos para Decisiones Reales</span>
                                </h1>
                                <p className="text-xl text-gray-500 max-w-3xl mx-auto font-light leading-relaxed mb-12 italic">
                                    "Hacia la unificación predictiva de un ecosistema digital de alta escala."
                                </p>
                                <button 
                                    onClick={() => window.open(subscribeUrl, '_blank')} 
                                    className="bg-[#122805] text-white px-10 py-4 rounded-full font-bold flex items-center justify-center gap-3 hover:bg-[#34CC03] hover:text-[#122805] transition-all shadow-xl shadow-[#34CC03]/10 mx-auto"
                                >
                                    Suscribirse al Boletín <NexoIcon name="mail" size={18} />
                                </button>
                            </section>

                            {/* 1. Introducción: El Ecosistema nexo.la */}
                            <section id="intro" className="scroll-mt-24">
                                <div className="bg-white p-10 md:p-16 rounded-[3rem] shadow-sm border border-gray-50 flex flex-col md:flex-row gap-12 items-center">
                                    <div className="md:w-2/3">
                                        <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">01. Introducción</h2>
                                        <h3 className="text-3xl font-bold text-[#122805] mb-8 tracking-tight">¿Qué es nexo.la?</h3>
                                        <p className="text-gray-600 leading-relaxed text-lg font-light mb-6">
                                            <strong>nexo.la</strong> es una plataforma de inteligencia de negocios y contenido estratégico diseñada para transformar datos complejos en decisiones accionables. En un entorno saturado de ruido informativo, nexo se posiciona como el puente entre los datos crudos y la ejecución empresarial en finanzas, economía y emprendimiento. 
                                        </p>
                                        <p className="text-gray-600 leading-relaxed text-lg font-light">
                                            Este portafolio utiliza a nexo.la como caso de estudio central debido a su naturaleza multicanal: con un boletín diario de más de <strong>6,000 suscriptores</strong>, presencia web dinámica y una red social diversificada, representa el escenario ideal para aplicar modelos de IA y analítica avanzada. La elección de nexo.la permite demostrar cómo la ciencia de datos puede escalar un medio digital emergente hacia un modelo de "Media-as-a-Service" altamente eficiente, protegiendo al mismo tiempo la reputación de envío y maximizando el compromiso de una comunidad de alto nivel.
                                        </p>
                                    </div>
                                    <div className="md:w-1/3 grid grid-cols-1 gap-4 w-full">
                                        <div className="bg-[#F1F2E9] p-6 rounded-2xl text-center border border-gray-100">
                                            <div className="text-4xl font-black text-[#122805] mb-1">+6K</div>
                                            <div className="text-[10px] font-bold uppercase text-gray-400 tracking-widest">Suscriptores</div>
                                        </div>
                                        <div className="bg-[#122805] p-6 rounded-2xl text-center">
                                            <div className="text-2xl font-black text-[#34CC03] mb-1">IA & BI</div>
                                            <div className="text-[10px] font-bold uppercase text-white/50 tracking-widest">Eje Central</div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* 2. Justificación Estratégica */}
                            <section id="justificacion" className="scroll-mt-24">
                                <div className="flex flex-col md:flex-row gap-16">
                                    <div className="md:w-1/3">
                                        <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">02. Justificación</h2>
                                        <h3 className="text-4xl font-bold text-[#122805] tracking-tighter">El Valor de la Inteligencia</h3>
                                    </div>
                                    <div className="md:w-2/3 space-y-8">
                                        <p className="text-gray-600 text-lg font-light leading-relaxed">
                                            La creación de este portafolio responde a la necesidad de transicionar de una gestión reactiva a una proactiva. La aplicación de IA y dashboards permitirá:
                                        </p>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <NexoIcon name="shield-check" className="text-[#34CC03]" size={32} />
                                                <h4 className="font-bold text-[#122805]">Protección de Activos</h4>
                                                <p className="text-sm text-gray-500">Modelos predictivos de Spam Rate en AWS para asegurar la supervivencia del canal principal.</p>
                                            </div>
                                            <div className="space-y-4">
                                                <NexoIcon name="layout" className="text-[#34CC03]" size={32} />
                                                <h4 className="font-bold text-[#122805]">Unificación de Silos</h4>
                                                <p className="text-sm text-gray-500">Dashboards que integran Mautic, Google Analytics y Redes Sociales en una sola fuente de verdad.</p>
                                            </div>
                                            <div className="space-y-4">
                                                <NexoIcon name="trending-up" className="text-[#34CC03]" size={32} />
                                                <h4 className="font-bold text-[#122805]">Optimización de Contenido</h4>
                                                <p className="text-sm text-gray-500">Análisis de correlación para identificar qué temas (autos, real estate) impulsan el ROI.</p>
                                            </div>
                                            <div className="space-y-4">
                                                <NexoIcon name="zap" className="text-[#34CC03]" size={32} />
                                                <h4 className="font-bold text-[#122805]">Escalabilidad</h4>
                                                <p className="text-sm text-gray-500">Automatización de la recopilación de datos para permitir al equipo enfocarse en la estrategia.</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            {/* 3. Audiencia Meta */}
                            <section id="audiencia" className="bg-[#122805] p-12 md:p-20 rounded-[3rem] text-white overflow-hidden relative">
                                <div className="absolute top-0 right-0 p-10 opacity-5">
                                    <NexoIcon name="users" size={200} />
                                </div>
                                <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">03. Audiencia Meta</h2>
                                <h3 className="text-4xl font-bold mb-12 tracking-tighter">¿A quién nos dirigimos?</h3>
                                <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                                    {[
                                        { t: "Facultad INCAE", d: "Evaluadores que buscan rigor técnico y metodológico en la aplicación de IA." },
                                        { t: "Aliados Potenciales", desc: "Empresas e inversionistas interesados en la data-driven media." },
                                        { t: "Tomadores de Decisión", desc: "Líderes que requieren claridad analítica para sus propios negocios." },
                                        { t: "Equipo nexo.la", desc: "Stakeholders internos que utilizarán estas herramientas día a día." }
                                    ].map((a, i) => (
                                        <div key={i} className="space-y-2 border-l border-white/10 pl-6">
                                            <h4 className="font-bold text-[#34CC03] uppercase text-xs tracking-widest">{a.t}</h4>
                                            <p className="text-sm text-white/60 font-light">{a.d || a.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            {/* 4. Portafolio Ideal vs Actual */}
                            <section className="grid md:grid-cols-2 gap-12">
                                <div className="bg-white p-12 rounded-[3rem] border border-gray-100 shadow-sm nexo-card">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">04. El Ideal</h2>
                                    <h3 className="text-2xl font-bold text-[#122805] mb-6 tracking-tight italic">¿Cómo imagino mi portafolio?</h3>
                                    <p className="text-gray-500 font-light leading-relaxed mb-6">
                                        No lo visualizo como una entrega académica estática, sino como una <strong>Experiencia de Inmersión Ejecutiva</strong>.
                                    </p>
                                    <ul className="space-y-4 text-sm text-gray-600">
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Navegación fluida tipo "One-Page Storytelling".</li>
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Dashboards interactivos integrados (no estáticos).</li>
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Narrativa clara: Problema de negocio → Análisis → Solución.</li>
                                    </ul>
                                </div>
                                <div className="bg-white p-12 rounded-[3rem] border border-gray-100 shadow-sm nexo-card">
                                    <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">05. Capacidad Actual</h2>
                                    <h3 className="text-2xl font-bold text-[#122805] mb-6 tracking-tight italic">¿Qué puedo crear hoy?</h3>
                                    <p className="text-gray-500 font-light leading-relaxed mb-6">
                                        En esta fase inicial, estoy en capacidad de desplegar:
                                    </p>
                                    <ul className="space-y-4 text-sm text-gray-600">
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Estructura de integración de datos Mautic + GA.</li>
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Visualización de KPIs de entregabilidad (Spam Rate).</li>
                                        <li className="flex gap-3"><NexoIcon name="check-circle" size={18} className="text-[#34CC03]" /> Landing page profesional de presentación institucional.</li>
                                    </ul>
                                </div>
                            </section>

                            {/* 5. Detalles de Diseño */}
                            <section id="diseno" className="text-center">
                                <h2 className="text-[10px] font-black uppercase tracking-[0.4em] text-[#34CC03] mb-6">06. Detalles de Diseño</h2>
                                <h3 className="text-4xl font-bold text-[#122805] mb-12 tracking-tighter">Estética de Consultoría</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">
                                    <div className="bg-white p-8 rounded-2xl border border-gray-100">
                                        <div className="w-10 h-10 bg-[#34CC03] rounded-full mx-auto mb-4"></div>
                                        <span className="text-[10px] font-bold">Verde Nexo<br/>#34CC03</span>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl border border-gray-100">
                                        <div className="w-10 h-10 bg-[#122805] rounded-full mx-auto mb-4"></div>
                                        <span className="text-[10px] font-bold">Verde Oscuro<br/>Highlight</span>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl border border-gray-100">
                                        <div className="text-2xl font-black mb-4">Inter</div>
                                        <span className="text-[10px] font-bold">Tipografía<br/>Sans-Serif</span>
                                    </div>
                                    <div className="bg-white p-8 rounded-2xl border border-gray-100">
                                        <NexoIcon name="mouse-pointer-2" className="mx-auto mb-4" />
                                        <span className="text-[10px] font-bold">Interacción<br/>Minimalista</span>
                                    </div>
                                </div>
                                <div className="mt-12 text-gray-500 font-light text-sm max-w-2xl mx-auto italic">
                                    "Cada decisión visual, desde el uso extensivo de espacios en blanco (Off-White) hasta los bloques de texto breves, está diseñada para proyectar la claridad y precisión de una firma como Deloitte o McKinsey."
                                </div>
                            </section>

                            {/* Conclusión */}
                            <section className="bg-white rounded-[4rem] p-16 md:p-24 text-center border border-gray-50 shadow-sm relative overflow-hidden">
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#F1F2E9]/30"></div>
                                <div className="relative z-10 max-w-2xl mx-auto">
                                    <NexoLogo className="h-10 w-auto mx-auto mb-10 opacity-20" />
                                    <h2 className="text-4xl font-black text-[#122805] mb-6 tracking-tighter italic">Visión de Futuro</h2>
                                    <p className="text-gray-500 font-light text-lg mb-12 italic leading-relaxed">
                                        El objetivo último es convertir este portafolio en un <strong>activo digital útil</strong> para nexo.la. No es simplemente una entrega académica; es la infraestructura de inteligencia sobre la cual escalaremos el próximo medio regional liderado por la ciencia de datos.
                                    </p>
                                    <div className="flex justify-center items-center gap-6 text-[#122805] font-black text-[10px] uppercase tracking-[0.4em]">
                                        <span className="w-12 h-px bg-[#34CC03]"></span>
                                        IA & Business Intelligence Hub
                                        <span className="w-12 h-px bg-[#34CC03]"></span>
                                    </div>
                                    <button 
                                        onClick={() => window.open(subscribeUrl, '_blank')}
                                        className="mt-12 px-12 py-4 bg-[#34CC03] text-[#122805] rounded-full font-bold uppercase text-[10px] tracking-widest hover:bg-[#122805] hover:text-white transition-all shadow-xl shadow-[#34CC03]/20"
                                    >
                                        Ver Resultados Reales
                                    </button>
                                </div>
                            </section>

                        </main>

                        <footer className="py-16 px-6 bg-white border-t border-gray-100 text-center mt-auto">
                            <div className="max-w-6xl mx-auto">
                                <NexoLogo className="h-5 w-auto mx-auto mb-4 opacity-40" />
                                <p className="text-[10px] text-gray-400 uppercase tracking-widest">© 2024 Intelligence Hub | INCAE</p>
                                <div className="mt-4 text-[10px] font-black uppercase tracking-[0.2em] text-[#122805]">
                                    Consultor: [Tu Nombre]
                                </div>
                            </div>
                        </footer>
                    </div>
                );
            };

            const container = document.getElementById('root');
            if (container) {
                const root = ReactDOM.createRoot(container);
                root.render(<App />);
            }
        }
    </script>
</body>
</html>
